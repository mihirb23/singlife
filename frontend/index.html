<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Singlife AI Ops</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

  <!-- sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="burger" id="sidebarClose" title="Close sidebar">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M4 6h12M4 10h12M4 14h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="icon-btn" id="newChatBtn" title="New chat">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- mode toggle -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeChatBtn" data-mode="chat">Chat</button>
      <button class="mode-btn" id="modeEvalBtn" data-mode="evaluate">Evaluate</button>
      <button class="mode-btn" id="modeEmailBtn" data-mode="email">Draft Email</button>
      <button class="mode-btn" id="modeQABtn" data-mode="qa">QA Review</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Chats</div>
      <nav class="conversation-list" id="conversationList"></nav>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Documents</div>
      <div class="document-list" id="documentList"></div>
      <div class="upload-area">
        <input type="file" id="fileInput" accept=".pdf,.txt" hidden />
        <button class="upload-btn" id="uploadBtn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 10V2M3 6l4-4 4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M1 10v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Upload document
        </button>
      </div>
    </div>

    <div class="sidebar-footer">
      <a href="/architecture.html" style="color:#8b8b8b;text-decoration:none;font-size:12px;display:block;margin-bottom:8px;" target="_blank">View Architecture &rarr;</a>
      <span class="doc-count" id="docCount">No documents</span>
      <div class="status-indicator">
        <span class="status-dot" id="sidebarStatus"></span>
        <span class="status-text" id="sidebarStatusText">Checking...</span>
      </div>
    </div>
  </aside>

  <!-- main content -->
  <main class="main" id="main">

    <header class="topbar" id="topbar">
      <button class="burger" id="sidebarOpen" title="Open sidebar">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M4 6h12M4 10h12M4 14h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <!-- chat area -->
    <div class="chat-area" id="chatContainer">

      <!-- welcome screen — shows before any messages -->
      <div class="welcome" id="welcome">
        <span class="welcome-name">Singlife AI Ops</span>

        <div class="welcome-input-wrap">
          <div class="input-bar">
            <button class="attach-btn" id="welcomeUploadBtn" title="Upload document">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M14 10.5v2.5a2 2 0 01-2 2H6a2 2 0 01-2-2v-2.5M9 11V3M6 6l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <textarea id="userInput" class="input-field" placeholder="Ask about SOPs, or paste case data to evaluate..." rows="1"></textarea>
            <span class="model-label" id="modeLabel">Chat</span>
            <button class="send-btn" id="sendBtn" disabled>
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M9 15V3M4 8l5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <p class="input-hint" id="inputNote">Upload SOPs and documents to get started</p>
        </div>
      </div>

      <!-- messages go here -->
      <div class="messages" id="messages"></div>
    </div>

    <!-- input bar that shows at the bottom during active chat -->
    <div class="bottom-input hidden" id="bottomInput">
      <div class="input-bar">
        <button class="attach-btn" id="chatUploadBtn" title="Upload document">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M14 10.5v2.5a2 2 0 01-2 2H6a2 2 0 01-2-2v-2.5M9 11V3M6 6l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <textarea id="chatInput" class="input-field" placeholder="Ask anything..." rows="1"></textarea>
        <span class="model-label" id="chatModeLabel">Chat</span>
        <button class="send-btn" id="chatSendBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 15V3M4 8l5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

  </main>

  <script src="/js/app.js"></script>
</body>
</html>
